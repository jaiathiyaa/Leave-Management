{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Leave Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      background: linear-gradient(135deg, #4f46e5 0%, #0d9488 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }
    .signup-wrapper {
      width: 100%;
      max-width: 600px;
    }
    .signup-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
    }
    .brand-logo {
      color: #1e1b4b;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .brand-subtitle {
      color: #64748b;
      font-weight: 500;
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div class="signup-wrapper">
    <div class="signup-card">
      <div class="brand-logo">Create Account</div>
      <div class="brand-subtitle">Join the Leave Portal to get started</div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-custom {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form action="{% url 'signup' %}" method="POST">
        {% csrf_token %}

        <div class="row g-3">
          <!-- Full Name -->
          <div class="col-md-6">
            <label for="fullname" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullname" name="fullname" placeholder="John Doe" required>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="john@example.com" required>
          </div>

          <!-- Phone Number -->
          <div class="col-md-6">
            <label for="phone_number" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone_number" name="phone_number" placeholder="10-digit number" required>
          </div>

          <!-- Register Number -->
          <div class="col-md-6">
            <label for="register_number" class="form-label">Register / ID Number</label>
            <input type="text" class="form-control" id="register_number" name="register_number" placeholder="Register Number" required>
          </div>

          <!-- Password -->
          <div class="col-md-12">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Minimum 6 characters" required>
          </div>

          <!-- Address -->
          <div class="col-md-12">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" name="address" rows="2" placeholder="Your residential address" required></textarea>
          </div>

          <!-- Role -->
          <div class="col-md-6">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" name="role" required onchange="toggleStaffType()">
              <option value="" disabled selected>Select Role</option>
              <option value="student">Student</option>
              <option value="staff">Staff</option>
            </select>
          </div>

          <!-- Department -->
          <div class="col-md-6">
            <label for="department" class="form-label">Department</label>
            <select class="form-select" id="department" name="department" required>
              <option value="" disabled selected>Select Department</option>
              <option value="computer-science">Computer Science</option>
              <option value="aids">AIDS (AI & DS)</option>
              <option value="mechanical">Mechanical</option>
              <option value="civil">Civil</option>
              <option value="ece">ECE</option>
              <option value="eee">EEE</option>
            </select>
          </div>

          <!-- Staff Type (Only shown if role is Staff) -->
          <div class="col-md-12 d-none" id="staff-type-container">
            <label for="staff_type" class="form-label">Staff Role Type</label>
            <select class="form-select" id="staff_type" name="staff_type">
              <option value="" disabled selected>Select Staff Type</option>
              <option value="tutor">Tutor</option>
              <option value="advisor">Advisor</option>
              <option value="hod">HOD</option>
            </select>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary-custom py-2">Sign Up</button>
        </div>

        <div class="text-center mt-3">
          <span class="text-muted small">Already have an account? 
            <a href="{% url 'login' %}" class="text-decoration-none font-weight-bold" style="color: var(--primary-color);">Login</a>
          </span>
        </div>
      </form>
    </div>
  </div>

  <!-- Script to toggle staff-type field -->
  <script>
    function toggleStaffType() {
      const roleSelect = document.getElementById('role');
      const staffTypeContainer = document.getElementById('staff-type-container');
      const staffTypeSelect = document.getElementById('staff_type');

      if (roleSelect.value === 'staff') {
        staffTypeContainer.classList.remove('d-none');
        staffTypeSelect.setAttribute('required', 'required');
      } else {
        staffTypeContainer.classList.add('d-none');
        staffTypeSelect.removeAttribute('required');
        staffTypeSelect.value = '';
      }
    }
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
