{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leave Analytics - Staff Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    canvas {
      max-width: 100%;
      height: 320px !important;
    }
    .stat-number {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--primary-color);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .stat-label {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-calendar"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Leave Portal (Staff)
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="{% url 'teacher' %}">Portal</a></li>
          <li class="nav-item"><a class="nav-link active" href="{% url 'leave_analytics' %}">Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'calendar_page' %}">Calendar</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Profile</a></li>
          <li class="nav-item"><a class="nav-link text-danger-hover" href="{% url 'logout' %}">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <h3 class="page-header text-center mb-4">Leave Application Analytics</h3>
      
      <div class="row g-4 mb-4">
        <!-- Statistics Summary Card -->
        <div class="col-12">
          <div class="card card-custom p-4 text-center">
            <div class="stat-number">{{ total_leaves }}</div>
            <div class="stat-label">Total Leave Applications Submitted</div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- Leave by Department Chart -->
        <div class="col-md-6">
          <div class="card card-custom p-4 h-100">
            <h5 class="fw-bold mb-4 text-center text-md-start">Distribution by Department</h5>
            <div class="position-relative">
              <canvas id="deptChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Leave by Reason Chart -->
        <div class="col-md-6">
          <div class="card card-custom p-4 h-100">
            <h5 class="fw-bold mb-4 text-center text-md-start">Distribution by Reason</h5>
            <div class="position-relative">
              <canvas id="reasonChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Chart rendering -->
  <script>
    const deptData = JSON.parse('{{ dept_counts_json|escapejs }}');
    const reasonData = JSON.parse('{{ reason_counts_json|escapejs }}');

    const deptCtx = document.getElementById('deptChart').getContext('2d');
    const reasonCtx = document.getElementById('reasonChart').getContext('2d');

    // Make charts use Outfit font and look premium
    Chart.defaults.font.family = "'Outfit', sans-serif";
    Chart.defaults.font.size = 12;

    new Chart(deptCtx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(deptData).map(k => k.replace('-', ' ').toUpperCase()),
        datasets: [{
          data: Object.values(deptData),
          backgroundColor: ['#6366f1', '#14b8a6', '#f59e0b', '#ef4444', '#a855f7', '#06b6d4'],
          borderWidth: 2,
          borderColor: '#ffffff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 15,
              usePointStyle: true
            }
          }
        }
      }
    });

    new Chart(reasonCtx, {
      type: 'pie',
      data: {
        labels: Object.keys(reasonData),
        datasets: [{
          data: Object.values(reasonData),
          backgroundColor: ['#0d9488', '#8b5cf6', '#f97316', '#10b981', '#ec4899', '#475569'],
          borderWidth: 2,
          borderColor: '#ffffff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 15,
              usePointStyle: true
            }
          }
        }
      }
    });
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
