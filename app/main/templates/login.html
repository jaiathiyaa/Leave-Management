{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Student Leave Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      background: linear-gradient(135deg, #4f46e5 0%, #0d9488 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .login-wrapper {
      width: 100%;
      max-width: 440px;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
    }
    .brand-logo {
      color: #1e1b4b;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .brand-subtitle {
      color: #64748b;
      font-weight: 500;
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-logo">Leave Portal</div>
      <div class="brand-subtitle">Sign in to manage leave applications</div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-custom {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label mb-0">Password</label>
            <a href="#" class="text-decoration-none small text-muted">Forgot Password?</a>
          </div>
          <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary-custom">Sign In</button>
        </div>
        <div class="text-center mt-4">
          <span class="text-muted small">Don't have an account? 
            <a href="{% url 'signup' %}" class="text-decoration-none font-weight-bold" style="color: var(--primary-color);">Create one</a>
          </span>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
